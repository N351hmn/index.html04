<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.H - Shopping Cart</title>
    <style>
      /* --- COPIED DIRECTLY FROM YOUR FAVORITES UI --- */
      body {
        font-family: 'Lucida Sans', Geneva, Verdana, sans-serif; 
        background-color: rgb(253, 249, 184);
        padding: 20px;
        margin: 0;
      }
      .container {
        background-color: rgb(82, 21, 21);
        position: fixed;
        top: 0px;
        left: 50%;
        transform: translateX(-50%);
        padding: 5px 15px;
        width: 600px;
        border-radius: 10px;
        border: 2.5px solid black;
        box-shadow: 0 4px 7px 2px gray;
        z-index: 1000;
        height: 100px;
        text-align: center;
        transition: top 0.3s;
      }
      .container a {
        color: rgba(253, 242, 86, 0.952);
        text-decoration: none;
        font-size: 25px;
        padding: 5px 15px;
        margin: 3px;
        display: inline-block;
        margin-top: 30px;
      }
      .container a:hover {
         color: rgba(219, 206, 26, 0.815);
         text-shadow: 0 2px 3px darkgray;
      }
      .buttons {
        position: fixed;
        top: 20px;
        left: 20px;
        display: flex;
        gap: 10px;
        z-index: 1001;
      }

      .favorites button {
         font-size: 24px;
        font-weight: bold;
        background-color: none;
        border: none;
        box-shadow: 0 4px 3px 3px gray;
        margin: 0;
        border-radius: 10px; 
        height: auto;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 5px 10px;
        transition: transform 0.2s;
      }
      .favorites button:hover {
        background-color: none;
        transform: scale(1.1);
      }
      .favorites button:active {
        background-color: none;
        transform: scale(0.95);
      }
      #cart-section {
        padding: 40px 20px;
        background-color: rgb(11, 11, 31); /* Your dark blue */
        border-radius: 15px;
        margin-top: 100px;
        color: rgb(228, 218, 75); /* Your gold */
        text-align: center;
        max-width: 1000px;
        margin-left: auto;
        margin-right: auto;
        min-height: 400px;
        border: 1px solid #ccc;
      }

      .cart-items-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
        gap: 25px;
        justify-items: center;
        padding: 20px;
      }

      .cart-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid rgba(253, 242, 86, 0.3);
        transition: 0.3s;
      }

      .cart-item:hover {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.1);
      }

      .cart-item img {
        width: 250px;
        height: 250px;
        object-fit: cover;
        border-radius: 5px;
        margin-bottom: 10px;
      }

      .total-area {
        margin-top: 30px;
        padding: 20px;
        border-top: 2px solid rgba(253, 242, 86, 0.2);
      }

      .checkout-btn {
        background-color: white;
        border: 3px solid black;
        padding: 10px 25px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 10px;
        margin-top: 15px;
      }

      .checkout-btn:hover {
        background-color: rgb(253, 242, 86);
      }
    </style>
</head>
<body>

    <div class="buttons">
        <div class="favorites">
            <button onclick="window.location.href='index.html'">🛒<span id="total">$0</span></button>
        </div>
    </div>

    <nav class="container">
        <a href="index.html">Menu</a>
        <a href="index.html#about-us">About Us</a>
        <a href="index.html#contact-us">Contact Us</a>
    </nav>

    <div id="cart-section">
        <h2>Your Shopping Cart 🛒</h2>
        <div id="cart-items" class="cart-items-container">
            </div>
        
        <div class="total-area">
            <h3>Total: $<span id="cart-total-price">0</span></h3>
            <button class="checkout-btn" onclick="confirmPurchase()">Confirm Purchase ✅</button>
        </div>
    </div>

    <script>
    function getUser() {
    let user = JSON.parse(localStorage.getItem("user"));
    if (!user) return { name: "Guest", cart: [], favorites: [] };
    return user;
}

    function loadCart() {
    const user = getUser();
    const container = document.getElementById("cart-items");
    const totalDisplay = document.getElementById("cart-total-price");
    
    if (!container) return;
    container.innerHTML = "";

    if (!user.cart || user.cart.length === 0) {
        container.innerHTML = "<p style='opacity:0.7; grid-column: 1/-1;'>Your cart is empty!</p>";
        totalDisplay.innerText = "0";
        return;
    }

    let total = 0;
    user.cart.forEach((item, index) => {
        total += item.price;
        
        // If no image was saved, use a placeholder
        const resolvedImg = item.img || getFavoriteImage(item.name, item.price); 

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
            <img src="${resolvedImg}" alt="${item.name}">
            <p>${item.name} - $${item.price}</p>
            <button onclick="removeFromCart(${index})" 
                style="background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">
                Remove
            </button>
        `;
        container.appendChild(div);
    });
    totalDisplay.innerText = total;
}

function removeFromCart(index) {
    let user = getUser();
    user.cart.splice(index, 1);
    localStorage.setItem("user", JSON.stringify(user));
    loadCart();
}

function confirmPurchase() {
    let user = getUser();
    if (!user.cart || user.cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }
    alert("Thank you for your purchase!");
    user.cart = [];
    localStorage.setItem("user", JSON.stringify(user));
    window.location.href = "index.html";
}

    window.onload = loadCart;
    </script>
</body>
</html>

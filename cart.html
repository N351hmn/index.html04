<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.H - Shopping Cart</title>
    <style>
      /* --- COPIED DIRECTLY FROM YOUR FAVORITES UI --- */
      body {
        font-family: 'Lucida Sans', Geneva, Verdana, sans-serif; 
        background-color: rgb(253, 249, 184);
        padding: 20px;
        margin: 0;
      }
      .container {
        background-color: rgb(82, 21, 21);
        position: fixed;
        top: 0px;
        left: 50%;
        transform: translateX(-50%);
        padding: 5px 15px;
        box-sizing: border-box;
        width: 600px;
        border-radius: 10px;
        border: 2.5px solid black;
        box-shadow: 0 4px 7px 2px gray;
        text-align: center;
        transition: top 0.3s;
      }
      .container a {
        color: rgba(253, 242, 86, 0.952);
        text-decoration: none;
        font-size: 25px;
        padding: 5px 15px;
        margin: 3px;
        display: inline-block;
        margin-top: 10px;
      }
      .container a:hover {
         color: rgba(219, 206, 26, 0.815);
         text-shadow: 0 2px 3px darkgray;
      }
      .buttons {
        position: fixed;
        top: 20px;
        left: 20px;
        display: flex;
        gap: 10px;
        z-index: 1001;
      }
      .favorites button {
         font-size: 24px;
        font-weight: bold;
        background-color: none;
        border: none;
        box-shadow: 0 4px 3px 3px gray;
        margin: 0;
        border-radius: 10px; 
        height: auto;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 5px 10px;
        transition: transform 0.2s;
      }
      .favorites button:hover {
        background-color: none;
        transform: scale(1.1);
      }
      .favorites button:active {
        background-color: none;
        transform: scale(0.95);
      }
      .favorites button span {
        min-width: 20px;
        font-size: 16px;
        font-weight: bold;
        color: black;
        background-color: rgba(253, 242, 86, 0.952);
        padding: 2px 6px;
        border-radius: 20px;
        text-align: center;
        display: inline-block;
      }
      #cart-section {
        padding: 40px 20px;
        background-color: rgb(11, 11, 31); /* Your dark blue */
        border-radius: 15px;
        margin-top: 100px;
        color: rgb(228, 218, 75); /* Your gold */
        text-align: center;
        max-width: 1000px;
        margin-left: auto;
        margin-right: auto;
        min-height: 400px;
        border: 1px solid #ccc;
      }

      .cart-items-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
        gap: 25px;
        justify-items: center;
        padding: 20px;
      }

      .cart-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        border: 1px solid rgba(253, 242, 86, 0.3);
        transition: 0.3s;
      }

      .cart-item:hover {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.1);
      }

      .cart-item img {
        width: 250px;
        height: 250px;
        object-fit: cover;
        border-radius: 5px;
        margin-bottom: 10px;
      }

      .total-area {
        margin-top: 30px;
        padding: 20px;
        border-top: 2px solid rgba(253, 242, 86, 0.2);
      }

      .checkout-btn {
        background-color: white;
        border: 3px solid black;
        padding: 10px 25px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 10px;
        margin-top: 15px;
      }

      .checkout-btn:hover {
        background-color: rgb(253, 242, 86);
      }
    </style>
</head>
<body>

    <div class="buttons">
        <div class="favorites">
            <button onclick="window.location.href='index.html'">🛒<span id="total">$0</span></button>
        </div>
    </div>

    <nav class="container">
    <a href="index.html" onclick="handleNav('menu', event)">Menu</a>
    <a href="index.html" onclick="handleNav('about-us', event)">About Us</a>
    <a href="index.html" onclick="handleNav('contact-us', event)">Contact Us</a>
</nav>

    <div id="cart-section">
        <h2>Your Shopping Cart 🛒</h2>
        <div id="cart-items" class="cart-items-container">
            </div>
        
        <div class="total-area">
            <h3>Total: $<span id="cart-total-price">0</span></h3>
            <button class="checkout-btn" onclick="confirmPurchase()">Confirm Purchase ✅</button>
        </div>
    </div>

    <script>
    function getUser() {
    let user = JSON.parse(localStorage.getItem("user"));
    if (!user) return { name: "", cart: [], favorites: [], deleted: [] };
    
    user.cart = user.cart || [];
    return user;
}

function loadCart() {
    const user = getUser();
    const container = document.getElementById("cart-items");
    const totalDisplay = document.getElementById("cart-total-price");
    const topLeftTotal = document.getElementById("total");

    if (!container || !totalDisplay) return;
    container.innerHTML = "";

    if (!user.cart || user.cart.length === 0) {
        container.innerHTML = "<p style='grid-column: 1/-1;'>Your cart is empty!</p>";
        totalDisplay.innerText = "0.00";
        if (topLeftTotal) topLeftTotal.innerText = "$0.00";
        return;
    }

    const groupedCart = user.cart.reduce((acc, item) => {
        if (!acc[item.name]) {
            acc[item.name] = { ...item, quantity: 1 };
        } else {
            acc[item.name].quantity += 1;
        }
        return acc;
    }, {});

    let grandTotal = 0;

    Object.values(groupedCart).forEach((item) => {
        const itemPrice = Number(item.price) || 0;
        const itemTotal = itemPrice * item.quantity;
        grandTotal += itemTotal;
        
        const resolvedImg = item.img || getCartImage(item.name, item.price); 

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
            <img src="${resolvedImg}" alt="${item.name}">
            <div class="cart-item-info">
                <p><strong>${item.name}</strong> <span style="color: #ffd700;">x${item.quantity}</span></p>
                <p>Unit Price: $${itemPrice.toFixed(2)}</p>
                <p>Subtotal: $${itemTotal.toFixed(2)}</p>
                <button onclick="removeAllOfItem('${item.name}')" 
                        style="background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-top: 10px;">
                    Remove All
                </button>
            </div>
        `;
        container.appendChild(div);
    });

    totalDisplay.innerText = grandTotal.toFixed(2);
    if (topLeftTotal) {
        topLeftTotal.innerText = "$" + grandTotal.toFixed(2);
    }
}

function removeAllOfItem(itemName) {
    let user = getUser();

    user.cart = user.cart.filter(item => item.name !== itemName);
    localStorage.setItem("user", JSON.stringify(user));
    loadCart();
}
function getCartImage(name, price) {
    const cartImages = {
      "Green Hoodie with BROOKLYN Word|15": "hoody1.jpg",
      "White & Purple Hoodie and BROOKLYN|17": "hoody2.jpg",
      "Blue Hoodie|15": "hoody3.jpg",
      "Green Hoodie|18": "hoody4.jpg",
      "Black Hoodie with a Painting from the behind|20": "hoody5.jpg",
      "Brown full suit|50": "full1.jfif",
      "Gray full suit with a word|75": "full2.jfif",
      "Blue full suit with a word|75": "full3.jfif",
      "Navy full suit with a moonlight word|80": "full4.jpg",
      "Gray full suit with a word|85": "full5.jpg",
      "2 Green Hoodies|175": "couples1.jpg",
      "2 Green & Gray Hoodies|160": "couples2.jfif",
      "2 Beige & Darkgreen Hoodies|185": "couples3.jfif",
      "2 White & Green Hoodies|187": "couples4.jpg",
      "2 Black & Purple with Draw in Back|218": "couples5.webp",
      "Full White with Golden lines suit|182": "men1.jfif",
      "Full Black suit|112": "men2.jpg",
      "Dark Brown Full suit|158": "men3.jfif",
      "Black Hoodie with Drawings|190": "men4.jpg",
      "Dark Green Sweatshirt|118": "men5.jpg"
    };

    return cartImages[`${name}|${price}`] || "images.jfif";
  }

document.addEventListener("DOMContentLoaded", loadCart);

function removeFromCart(index) {
    let user = getUser();
    user.cart.splice(index, 1);
    localStorage.setItem("user", JSON.stringify(user));
    loadCart();
}

function confirmPurchase() {
    let user = getUser();
    if (!user.cart || user.cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }
    alert("Thank you for your purchase!");
    user.cart = [];
    localStorage.setItem("user", JSON.stringify(user));
    window.location.href = "index.html";
}
      const mainSections = ["menu", "about-us", "contact-us"];

      function showMainSection(id, event) {
        event.preventDefault();

        mainSections.forEach((section) => {
          document.getElementById(section).style.display = "none";
        });

        document.getElementById(id).style.display = "block";

        if (id === "menu") {
          menuSubsections.forEach((sub) => {
            document.getElementById(sub).style.display = "none";
          });

          document.getElementById("hoodies").style.display = "block";
        }
      }
      document.addEventListener("DOMContentLoaded", () => {
    updateCartTotal(); 

    const hash = window.location.hash.replace("#", "");
    
    if (hash && mainSections.includes(hash)) {
        showMainSection(hash, { preventDefault: () => {} });
    }
});


    </script>
</body>
</html>
